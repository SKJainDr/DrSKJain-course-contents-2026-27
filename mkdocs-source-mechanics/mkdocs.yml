site_name: Advanced Mechanics & Properties of Matter Lab — User Guide
site_description: Theory, procedure, observation and result documentation for the Advanced Mechanics & Properties of Matter Lab virtual simulator
site_author: Dr. S. K. Jain
# Required so mkdocs-material emits correct absolute paths on generated
# pages that must work from any URL depth (currently just 404.html) -
# without this, those paths default to the domain root instead of this
# GitHub Pages *project* site's subpath, breaking the logo/CSS/JS/links
# on the 404 page specifically.
site_url: https://skjaindr.github.io/DrSKJain-course-contents-2026-27/docs-mechanics/
copyright: >
  © 2026 Author. Prepared &amp; maintained by
  <strong>Dr. S. K. Jain</strong>, Associate Professor in Physics, Department of Applied Sciences and Humanities, Invertis University, Bareilly, India —
  <a href="mailto:sanjeev.j@invertis.org">sanjeev.j@invertis.org</a>
site_dir: ../docs-mechanics

# The site links out to ../labs/advanced-mechanics-matter-lab.html (the interactive
# simulator), which lives one level above docs_dir as a sibling folder in the
# repo, not inside this MkDocs project. Those are correct, intentional links,
# but MkDocs' own link-checker only knows about files under docs_dir, so it
# would otherwise flag them as broken even in a successful build. This keeps
# --strict useful for genuine internal errors while allowing that one known
# category of external, out-of-tree links.
validation:
  links:
    not_found: ignore
theme:
  name: material
  custom_dir: overrides
  logo: assets/icon.svg
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light theme
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.highlight
extra_css:
  - stylesheets/extra.css
hooks:
  - hooks.py
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/errorcalc.js
  - javascripts/graph-paste.js
nav:
  - Home: index.md
  - Formula Reference: formula-reference.md
  - Glossary: glossary.md
  - Rotational Dynamics:
      - 1. Bifilar Suspension: experiments/bifilar-suspension.md
      - 2. Torsional Pendulum: experiments/torsional-pendulum.md
      - 3. Flywheel: experiments/flywheel.md
      - 4. Compound (Bar) Pendulum: experiments/compound-pendulum.md
  - Elasticity of Solids:
      - 5. Non-Uniform (Cantilever) Bending: experiments/non-uniform-bending.md
      - 6. Uniform Bending: experiments/uniform-bending.md
      - 7. Searle's Apparatus: experiments/searle-apparatus.md
      - 8. Static Torsion: experiments/static-torsion.md
  - Fluid Properties (Viscosity & Surface Tension):
      - 9. Poiseuille's Method: experiments/poiseuille-viscosity.md
      - 10. Stokes' Method: experiments/stokes-viscosity.md
      - 11. Capillary Rise Method: experiments/capillary-rise.md
  - Oscillations, Damping & Acoustic Methods (PG):
      - 12. Coupled Pendulums: experiments/coupled-pendulums.md
      - 13. Damped Oscillations: experiments/damped-oscillations.md
      - 14. Forced Oscillations & Resonance: experiments/forced-oscillations-resonance.md
      - 15. Ultrasonic Interferometer: experiments/ultrasonic-interferometer.md
  - Practical Applications:
      - 16. Ballistic Pendulum: experiments/ballistic-pendulum.md
      - 17. Rolling Race on an Incline: experiments/rolling-race-incline.md
      - 18. Gyroscopic Precession: experiments/gyroscopic-precession.md
  - Safety & Good Practice:
      - Mechanical Lab Safety, Precautions & Potential Harm: safety.md
  - Industrial & Applied Mechanics Workshops:
      - 'WS1: Vibration Isolation & Machine Mounting': workshops/vibration-isolation.md
      - 'WS2: Ultrasonic Non-Destructive Testing (NDT)': workshops/ultrasonic-ndt.md
      - 'WS3: Structural Beam Load Testing': workshops/beam-load-testing.md
      - 'WS4: Rotor Balancing Workshop': workshops/rotor-balancing.md
      - 'WS5: Viscometer Calibration & Lubricant Grading': workshops/viscometer-calibration.md
      - 'WS6: Automotive Shock-Absorber Damping Design': workshops/shock-absorber-design.md
